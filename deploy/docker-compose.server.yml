services:
  mysql:
    image: mysql:8.4
    container_name: kuangshi-mineral-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mineral_database}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mineral_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h 127.0.0.1 -uroot --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kuangshi-mineral-redis
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: kuangshi-mineral-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-12345678}
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "${NEO4J_HTTP_PORT:-17474}:7474"
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - mineral_neo4j_data:/data
      - mineral_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"${NEO4J_PASSWORD:-12345678}\" \"RETURN 1;\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  data-init:
    build:
      context: ..
      dockerfile: deploy/backend-admin.Dockerfile
    container_name: kuangshi-data-init
    command: ["/usr/local/bin/init-data.sh"]
    working_dir: /app/backend_all
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DB_NAME: ${MYSQL_DATABASE:-mineral_database}
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-mineral_database}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
    depends_on:
      mysql:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    profiles: ["init"]

  backend-admin:
    build:
      context: ..
      dockerfile: deploy/backend-admin.Dockerfile
    container_name: kuangshi-backend-admin
    environment:
      PORT: 5002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DB_NAME: ${MYSQL_DATABASE:-mineral_database}
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-mineral_database}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      SQLALCHEMY_ECHO: "false"
    depends_on:
      mysql:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "${ADMIN_PORT:-5002}:5002"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: kuangshi-main-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DB_NAME: ${MYSQL_DATABASE:-mineral_database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      ENABLE_IMAGE_MODEL: "false"
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_APP_HOST: ${VITE_APP_HOST:-154.44.25.243}
        VITE_API_URL: ${VITE_API_URL:-/backend}
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:-/admin-api}
        VITE_QA_API_BASE: ${VITE_QA_API_BASE:-/qa-api}
        VITE_GEM_API_BASE: ${VITE_GEM_API_BASE:-/gem-api}
        VITE_DEEP_LEARNING_URL: ${VITE_DEEP_LEARNING_URL:-http://154.44.25.243:18080/}
    container_name: kuangshi-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  mineral_mysql_data:
  mineral_neo4j_data:
  mineral_neo4j_logs:
